name: Check gold market signal

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch price, compute signal, notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/check-gold-signal.mjs

      - name: Commit updated price history and signal
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update gold price signal'
          file_pattern: 'data/gold-price-history.json app/public/data/gold-signal.json'
